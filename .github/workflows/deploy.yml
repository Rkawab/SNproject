name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /opt/SNproject
        run: |
          cp -f requirements.txt /tmp/req_sn_before.txt 2>/dev/null || true
          git pull --ff-only origin main

      - name: Install dependencies (only if requirements changed)
        working-directory: /opt/SNproject
        run: |
          if cmp -s requirements.txt /tmp/req_sn_before.txt; then
            echo "requirements.txt unchanged -> skip pip install"
          else
            echo "requirements.txt changed -> pip install"
            source venv/bin/activate
            pip install -r requirements.txt
          fi

      - name: Django migrate & collectstatic
        working-directory: /opt/SNproject
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput

      - name: Import content (md -> DB)
        working-directory: /opt/SNproject
        run: |
          source venv/bin/activate
          python manage.py import_content

      - name: Reload Gunicorn
        run: sudo systemctl reload snproject
