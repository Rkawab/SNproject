{% extends "base.html" %}
{% block title %}{{ n }} / {{ total }} | StudyNotes{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mt-3 mb-1">
    <span class="fw-bold">{{ n }} / {{ total }}</span>
    {% if q.genre %}<span class="badge bg-study-light text-study">{{ q.genre }}</span>{% endif %}
</div>
<div class="progress quiz-progress mb-3">
    <div class="progress-bar bg-study-primary" style="width: {% widthratio n total 100 %}%"></div>
</div>

<div class="card shadow-sm mb-3">
    <div class="card-body note-content">
        {{ q.question_html|safe }}
    </div>
</div>

<!-- A〜D をタップで回答 -->
<form method="post" action="{{ answer_url }}">
    {% csrf_token %}
    <div class="d-grid gap-2">
        {% for letter, text in q.choices.items %}
        <button type="submit" name="choice" value="{{ letter }}" class="btn btn-outline-study choice-btn">
            <span class="fw-bold me-2">{{ letter }}.</span> {{ text }}
        </button>
        {% endfor %}
    </div>
</form>

<div class="mt-4">
    <a href="{% if set_id %}{% url 'quiz:result' set_id %}{% else %}{% url 'quiz:review_result' %}{% endif %}"
       class="btn btn-link text-muted"
       onclick="return confirm('ここまでの結果を表示して中断しますか？');">中断して結果を見る</a>
</div>
{% endblock %}
