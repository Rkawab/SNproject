{% extends "base.html" %}
{% block title %}出題設定 | StudyNotes{% endblock %}

{% block content %}
<h1 class="h5 mt-3 mb-3">{{ qset.title }}</h1>

<form method="post" class="card shadow-sm">
    {% csrf_token %}
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label fw-bold">出題順</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="order" id="orderNormal" value="normal" checked>
                <label class="btn btn-outline-study" for="orderNormal">通常順</label>
                <input type="radio" class="btn-check" name="order" id="orderRandom" value="random">
                <label class="btn btn-outline-study" for="orderRandom">ランダム</label>
            </div>
        </div>

        {% if genres|length > 1 %}
        <div class="mb-3">
            <label class="form-label fw-bold" for="genreSelect">ジャンル</label>
            <select name="genre" id="genreSelect" class="form-select form-select-lg">
                <option value="">すべて</option>
                {% for g in genres %}
                <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-study big-btn w-100">▶ 開始する</button>
    </div>
</form>

<div class="mt-3">
    <a href="{% url 'quiz:top' %}" class="btn btn-link">← 演習トップへ</a>
</div>
{% endblock %}
