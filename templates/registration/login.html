{% extends "base.html" %}
{% block title %}ログイン | StudyNotes{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-study-primary text-white fw-bold">📚 StudyNotes ログイン</div>
            <div class="card-body">
                {% if form.errors %}
                <div class="alert alert-danger">ユーザー名またはパスワードが正しくありません。</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">ユーザー名</label>
                        <input type="text" name="username" id="id_username" class="form-control form-control-lg" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">パスワード</label>
                        <input type="password" name="password" id="id_password" class="form-control form-control-lg" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-study big-btn w-100">ログイン</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
